<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent w-100" style="position: absolute; top: 0;">
        <div class="container-fluid justify-content-center">
            <a class="navbar-brand fw-bold" href="#" style="color: #F5F5DC;">
                <i class="fa-solid fa-wallet me-2"></i> Alke Wallet
            </a>
        </div>
    </nav>
    <div class="wallet-container text-center" style="max-width: 400px;">
        <div class="wallet-header">
            <h2 class="mb-4">Bienvenido a Alke Wallet</h2>
            <p>Inicia sesión para continuar</p>
        </div>

       <form id="login-form" novalidate>
            <div class="mb-3 text-start">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com" required>
            </div>
            <div class="mb-3 text-start">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="12345678" required>
            </div>
            
            <button type="submit" class="btn btn-success w-100 py-2 mt-3" style="background-color: #00592e; border-color: #00592e;">
                Ingresar
            </button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
