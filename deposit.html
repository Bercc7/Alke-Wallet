<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depositar - Alke Wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="wallet-container" style="max-width: 500px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="m-0" style="color: #004225;">Depositar Dinero</h2>
            <a href="menu.html" class="text-decoration-none" style="color: #004225;">
                <i class="fa-solid fa-arrow-left"></i> Volver
            </a>
        </div>

        <p>Ingresa el monto que deseas añadir a tu billetera.</p>

        <form>
            <div class="mb-4">
                <label for="monto-deposito" class="form-label fw-bold">Monto a depositar</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" class="form-control" id="monto-deposito" placeholder="Ej: 50000" required>
                </div>
            </div>

            <button type="button" id="btn-depositar" class="btn w-100 py-3" 
                    style="background-color: #FFCF9D; color: #004225; font-weight: bold; border: 1px solid #004225;">
                Confirmar Depósito
            </button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
